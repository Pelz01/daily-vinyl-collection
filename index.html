<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vinyl Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0f;
      --surface: #161b22;
      --border: #30363d;
      --text: #f0f0f5;
      --text-dim: #8b949e;
      --accent: #f72585;
      --accent2: #4cc9f0;
    }
    
    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      position: relative;
    }
    
    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 80%, #261447 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #1a1a2e 0%, transparent 50%);
      opacity: 0.8;
      z-index: -1;
    }
    
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    
    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 6s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    p {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      max-width: 600px;
      margin-top: 1.5rem;
      opacity: 0.8;
      line-height: 1.6;
    }
    
    .date {
      position: fixed;
      top: 2rem;
      right: 2rem;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.875rem;
      opacity: 0.5;
    }
    
    .floating-shape {
      position: absolute;
      width: 70.05366126890402px;
      height: 100.13379034160744px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.1;
      animation: float 7.307280953241692s ease-in-out infinite;
    }
    
    .shape-1 { top: 10%; left: 10%; }
    .shape-2 { top: 60%; right: 15%; animation-delay: -2s; }
    .shape-3 { bottom: 20%; left: 20%; animation-delay: -4s; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div class="date">Friday, March 20, 2026</div>
  
  <div class="hero">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    
    <h1>Vinyl Collection</h1>
    <p>Animated vinyl records</p>
  </div>
  
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resize);
    resize();
    
    class Record {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = (Math.random() - 0.5) * 0.5;
        this.size = 30 + Math.random() * 50;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.02;
      }
      
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.rotation += this.rotationSpeed;
        
        if (this.x < -this.size) this.x = width + this.size;
        if (this.x > width + this.size) this.x = -this.size;
        if (this.y < -this.size) this.y = height + this.size;
        if (this.y > height + this.size) this.y = -this.size;
      }
      
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        
        // Record outer
        ctx.beginPath();
        ctx.arc(0, 0, this.size, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
        ctx.strokeStyle = '#f72585';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        // Grooves
        for (let i = 0.3; i < 1; i += 0.15) {
          ctx.beginPath();
          ctx.arc(0, 0, this.size * i, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(247, 37, 133, 0.3)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
        
        // Label
        ctx.beginPath();
        ctx.arc(0, 0, this.size * 0.25, 0, Math.PI * 2);
        ctx.fillStyle = '#f72585';
        ctx.fill();
        
        // Center hole
        ctx.beginPath();
        ctx.arc(0, 0, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#0a0a0f';
        ctx.fill();
        
        ctx.restore();
      }
    }
    
    const records = [];
    for (let i = 0; i < 8; i++) {
      records.push(new Record());
    }
    
    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
      ctx.fillRect(0, 0, width, height);
      
      records.forEach(r => {
        r.update();
        r.draw();
      });
      
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body>
</html>
